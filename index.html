<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Workout Plan</title>

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#0F1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233B82F6'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0F1117; }
  body {
    color: #E5E7EB;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    overscroll-behavior-y: none;
  }
  #root { max-width: 480px; margin: 0 auto; padding-bottom: 80px; min-height: 100vh; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="root"></div>

<script>
const STORAGE_KEY = "workout-plan-state-v1";

const workoutData = {
  monday: {
    label: "MON", title: "Upper Body", tag: "Strength", color: "#3B82F6",
    exercises: [
      { name: "Barbell Bench Press", sets: 4, reps: "5–8" },
      { name: "Pull-ups / Assisted Pull-ups", sets: 4, reps: "6–10" },
      { name: "Overhead Press", sets: 3, reps: "6–8" },
      { name: "Barbell Rows", sets: 3, reps: "8–10" },
      { name: "Incline Dumbbell Press", sets: 3, reps: "10–12" },
      { name: "Lateral Raises", sets: 3, reps: "12–15" },
      { name: "EZ Bar Curls", sets: 3, reps: "10–12" },
      { name: "Tricep Pushdowns", sets: 3, reps: "10–12" },
    ],
  },
  tuesday: {
    label: "TUE", title: "Lower Body", tag: "Strength", color: "#8B5CF6",
    exercises: [
      { name: "Back Squats", sets: 4, reps: "5–8" },
      { name: "Romanian Deadlifts", sets: 4, reps: "8–10" },
      { name: "Leg Press", sets: 3, reps: "10–12" },
      { name: "Walking Lunges", sets: 3, reps: "12 each leg" },
      { name: "Standing Calf Raises", sets: 4, reps: "12–15" },
      { name: "Hanging Leg Raises", sets: 3, reps: "12" },
      { name: "Plank", sets: 3, reps: "45–60 sec" },
    ],
  },
  thursday: {
    label: "THU", title: "Upper Body", tag: "Hypertrophy", color: "#10B981",
    exercises: [
      { name: "Incline Bench Press", sets: 4, reps: "8–12" },
      { name: "Lat Pulldowns", sets: 4, reps: "10–12" },
      { name: "Seated Cable Rows", sets: 3, reps: "10–12" },
      { name: "Dumbbell Shoulder Press", sets: 3, reps: "10–12" },
      { name: "Cable Flyes", sets: 3, reps: "12–15" },
      { name: "Face Pulls", sets: 3, reps: "15" },
      { name: "Hammer Curls", sets: 3, reps: "12" },
      { name: "Overhead Tricep Extensions", sets: 3, reps: "12" },
    ],
  },
  friday: {
    label: "FRI", title: "Lower Body", tag: "Hypertrophy", color: "#F59E0B",
    exercises: [
      { name: "Front Squats / Hack Squats", sets: 4, reps: "8–10" },
      { name: "Hip Thrusts", sets: 3, reps: "10–12" },
      { name: "Leg Extensions", sets: 3, reps: "12–15" },
      { name: "Hamstring Curls", sets: 3, reps: "12–15" },
      { name: "Bulgarian Split Squats", sets: 3, reps: "10 each leg" },
      { name: "Seated Calf Raises", sets: 4, reps: "15–20" },
      { name: "Cable Crunches", sets: 3, reps: "15" },
    ],
  },
  sunday: {
    label: "SUN", title: "Basketball", tag: "Conditioning", color: "#EF4444",
    exercises: [{ name: "Conditioning & court time", sets: null, reps: null }],
    note: "Treat as your conditioning day. Eat a carb-rich meal 2hrs before. Stay hydrated throughout.",
  },
};

const allDayOrder = [
  { key: "monday", ...workoutData.monday },
  { key: "tuesday", ...workoutData.tuesday },
  { key: null, label: "WED", title: "Rest", tag: "Recovery", color: "#374151" },
  { key: "thursday", ...workoutData.thursday },
  { key: "friday", ...workoutData.friday },
  { key: null, label: "SAT", title: "Rest", tag: "Recovery", color: "#374151" },
  { key: "sunday", ...workoutData.sunday },
];

const tips = [
  { icon: "💧", label: "Hydration", value: "2.5–3.5 L/day" },
  { icon: "🥩", label: "Protein", value: "25–40g every 3–5hrs" },
  { icon: "😴", label: "Sleep", value: "7.5–9 hrs/night" },
  { icon: "🔄", label: "Deload", value: "Every 8–10 weeks" },
];

const supplements = [
  { name: "Creatine", dose: "5g daily" },
  { name: "Whey Protein", dose: "As needed" },
  { name: "Vitamin D", dose: "Daily (esp. UK)" },
  { name: "Fish Oil", dose: "If no oily fish" },
];

const goalItems = [
  { icon: "🏋️", label: "Broader shoulders" },
  { icon: "💪", label: "Fuller chest & bigger arms" },
  { icon: "🔙", label: "Stronger back (makes waist look narrower)" },
  { icon: "🦵", label: "More muscular legs & glutes" },
  { icon: "🏀", label: "Better strength & basketball performance" },
];

// ---- State (persisted to localStorage) ----
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { activeDay: "monday", completed: {}, weights: {}, tab: "plan" };
}
let state = loadState();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function setState(patch) {
  state = { ...state, ...patch };
  saveState();
  render();
}

// ---- Helpers ----
function toggleSet(exIdx, setIdx) {
  const key = `${state.activeDay}-${exIdx}-${setIdx}`;
  const completed = { ...state.completed, [key]: !state.completed[key] };
  setState({ completed });
}

function setWeight(exIdx, val) {
  const key = `${state.activeDay}-${exIdx}`;
  const weights = { ...state.weights, [key]: val };
  setState({ weights });
}

function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "style") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "text") e.textContent = v;
    else e.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach((c) => {
    if (c == null) return;
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

// ---- Render ----
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  const day = state.activeDay ? workoutData[state.activeDay] : null;

  // Header
  root.appendChild(el("div", { style: {
    padding: "24px 20px 16px", borderBottom: "1px solid #1F2937"
  }}, [
    el("div", { style: { fontSize: "11px", letterSpacing: "0.15em", color: "#6B7280", textTransform: "uppercase", marginBottom: "4px" }, text: "Upper / Lower Split" }),
    el("div", { style: { fontSize: "24px", fontWeight: "700", letterSpacing: "-0.03em", color: "#F9FAFB" }, text: "Your Workout Plan" }),
    el("div", { style: { fontSize: "13px", color: "#6B7280", marginTop: "4px" }, text: "28 yr · 5'11\" · 71–72 kg · Target: 78–80 kg" }),
  ]));

  // Nav tabs
  const tabsWrap = el("div", { style: { display: "flex", borderBottom: "1px solid #1F2937", padding: "0 20px" } });
  ["plan", "recovery", "goals"].forEach((t) => {
    const active = state.tab === t;
    tabsWrap.appendChild(el("button", {
      style: {
        background: "none", border: "none", padding: "14px 16px 12px",
        fontSize: "13px", fontWeight: "600", cursor: "pointer",
        color: active ? "#F9FAFB" : "#6B7280",
        borderBottom: active ? `2px solid ${day ? day.color : "#3B82F6"}` : "2px solid transparent",
        letterSpacing: "0.02em", textTransform: "capitalize",
      },
      text: t,
      onClick: () => setState({ tab: t }),
    }));
  });
  root.appendChild(tabsWrap);

  if (state.tab === "plan") renderPlan(root, day);
  else if (state.tab === "recovery") renderRecovery(root);
  else if (state.tab === "goals") renderGoals(root);
}

function renderPlan(root, day) {
  // Day selector
  const selector = el("div", { style: { display: "flex", gap: "8px", padding: "16px 20px", overflowX: "auto" } });
  allDayOrder.forEach((d) => {
    const isActive = d.key === state.activeDay;
    const isRest = !d.key;
    selector.appendChild(el("button", {
      style: {
        flexShrink: "0", width: "52px", height: "64px", borderRadius: "12px",
        border: isActive ? `2px solid ${d.color}` : "2px solid transparent",
        background: isActive ? `${d.color}22` : isRest ? "#111827" : "#1F2937",
        cursor: isRest ? "default" : "pointer",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "4px",
        opacity: isRest ? "0.4" : "1",
      },
      onClick: () => { if (!isRest) setState({ activeDay: d.key }); },
    }, [
      el("span", { style: { fontSize: "10px", fontWeight: "700", letterSpacing: "0.1em", color: isActive ? d.color : "#9CA3AF" }, text: d.label }),
      el("span", { style: { fontSize: "9px", color: isActive ? d.color : "#4B5563", fontWeight: "600" }, text: isRest ? "REST" : d.tag.toUpperCase().slice(0, 5) }),
    ]));
  });
  root.appendChild(selector);

  if (!day) return;

  const exercisesWithSets = day.exercises.filter(ex => ex.sets);
  const totalSets = exercisesWithSets.reduce((acc, ex) => acc + ex.sets, 0);
  let completedCount = 0;
  day.exercises.forEach((ex, exIdx) => {
    if (!ex.sets) return;
    for (let s = 0; s < ex.sets; s++) {
      if (state.completed[`${state.activeDay}-${exIdx}-${s}`]) completedCount++;
    }
  });
  const progress = totalSets > 0 ? Math.round((completedCount / totalSets) * 100) : 0;

  // Day header
  const dayHeaderTop = el("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between" } }, [
    el("div", {}, [
      el("span", { style: { fontSize: "11px", color: day.color, fontWeight: "700", letterSpacing: "0.1em", textTransform: "uppercase" }, text: day.tag }),
      el("div", { style: { fontSize: "22px", fontWeight: "700", letterSpacing: "-0.03em", marginTop: "2px" }, text: day.title }),
    ]),
    totalSets > 0 ? el("div", { style: { textAlign: "right" } }, [
      el("div", { style: { fontSize: "22px", fontWeight: "700", color: day.color }, text: `${progress}%` }),
      el("div", { style: { fontSize: "11px", color: "#6B7280" }, text: `${completedCount}/${totalSets} sets` }),
    ]) : null,
  ]);

  const dayHeaderWrap = el("div", { style: { padding: "0 20px 16px" } }, [dayHeaderTop]);
  if (totalSets > 0) {
    dayHeaderWrap.appendChild(el("div", { style: { height: "4px", background: "#1F2937", borderRadius: "2px", marginTop: "12px" } }, [
      el("div", { style: { height: "100%", borderRadius: "2px", background: day.color, width: `${progress}%`, transition: "width 0.3s ease" } }),
    ]));
  }
  root.appendChild(dayHeaderWrap);

  // Exercises
  const exWrap = el("div", { style: { padding: "0 20px", display: "flex", flexDirection: "column", gap: "10px" } });

  if (state.activeDay === "sunday") {
    exWrap.appendChild(el("div", {
      style: { background: "#1F2937", borderRadius: "16px", padding: "20px", borderLeft: `4px solid ${day.color}` }
    }, [
      el("div", { style: { fontSize: "16px", fontWeight: "600", marginBottom: "8px" }, text: "🏀 Basketball Day" }),
      el("div", { style: { fontSize: "14px", color: "#9CA3AF", lineHeight: "1.6" }, text: day.note }),
    ]));
  } else {
    day.exercises.forEach((ex, exIdx) => {
      const setsArr = Array.from({ length: ex.sets || 0 });
      const allDone = setsArr.length > 0 && setsArr.every((_, s) => state.completed[`${state.activeDay}-${exIdx}-${s}`]);
      const weightKey = `${state.activeDay}-${exIdx}`;

      const setsRow = el("div", { style: { display: "flex", gap: "6px" } });
      setsArr.forEach((_, s) => {
        const key = `${state.activeDay}-${exIdx}-${s}`;
        const done = !!state.completed[key];
        setsRow.appendChild(el("button", {
          style: {
            width: "36px", height: "36px", borderRadius: "8px",
            border: done ? "none" : "1.5px solid #374151",
            background: done ? day.color : "#111827",
            color: done ? "#fff" : "#6B7280",
            fontSize: "11px", fontWeight: "700", cursor: "pointer",
          },
          text: done ? "✓" : String(s + 1),
          onClick: () => toggleSet(exIdx, s),
        }));
      });

      const weightInput = el("input", {
        type: "text", placeholder: "kg",
        style: {
          width: "52px", padding: "5px 8px", background: "#111827",
          border: "1px solid #374151", borderRadius: "8px", color: "#E5E7EB",
          fontSize: "12px", textAlign: "center", outline: "none",
        },
      });
      weightInput.value = state.weights[weightKey] || "";
      weightInput.addEventListener("input", (e) => setWeight(exIdx, e.target.value));

      exWrap.appendChild(el("div", {
        style: {
          background: allDone ? `${day.color}11` : "#1F2937",
          borderRadius: "14px", padding: "14px 16px",
          border: allDone ? `1px solid ${day.color}44` : "1px solid #374151",
        }
      }, [
        el("div", { style: { display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: "10px" } }, [
          el("div", { style: { flex: "1" } }, [
            el("div", { style: { fontSize: "14px", fontWeight: "600", color: allDone ? day.color : "#F9FAFB" }, text: (allDone ? "✓ " : "") + ex.name }),
            el("div", { style: { fontSize: "12px", color: "#6B7280", marginTop: "2px" }, text: `${ex.sets} sets · ${ex.reps} reps` }),
          ]),
          weightInput,
        ]),
        setsRow,
      ]));
    });
  }
  root.appendChild(exWrap);

  // Progression tip
  root.appendChild(el("div", {
    style: { margin: "20px 20px 0", background: "#111827", borderRadius: "12px", padding: "16px", border: "1px solid #1F2937" }
  }, [
    el("div", { style: { fontSize: "11px", color: "#6B7280", fontWeight: "700", letterSpacing: "0.1em", marginBottom: "6px" }, text: "📈 PROGRESSION" }),
    el("div", { style: { fontSize: "13px", color: "#9CA3AF", lineHeight: "1.6" }, text: "Add 1 rep each week. Once you hit the top of a rep range across all sets, increase weight by 2.5–5 kg (barbell) or 1–2 kg per dumbbell." }),
  ]));
}

function renderRecovery(root) {
  const wrap = el("div", { style: { padding: "20px" } });
  wrap.appendChild(el("div", { style: { fontSize: "16px", fontWeight: "700", marginBottom: "16px", color: "#F9FAFB" }, text: "Daily Targets" }));

  const tipsGrid = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "24px" } });
  tips.forEach((t) => {
    tipsGrid.appendChild(el("div", { style: { background: "#1F2937", borderRadius: "14px", padding: "16px", border: "1px solid #374151" } }, [
      el("div", { style: { fontSize: "22px", marginBottom: "8px" }, text: t.icon }),
      el("div", { style: { fontSize: "11px", color: "#6B7280", fontWeight: "700", letterSpacing: "0.08em", textTransform: "uppercase" }, text: t.label }),
      el("div", { style: { fontSize: "14px", fontWeight: "600", color: "#E5E7EB", marginTop: "3px" }, text: t.value }),
    ]));
  });
  wrap.appendChild(tipsGrid);

  wrap.appendChild(el("div", { style: { fontSize: "16px", fontWeight: "700", marginBottom: "16px", color: "#F9FAFB" }, text: "Supplements" }));
  const suppWrap = el("div", { style: { display: "flex", flexDirection: "column", gap: "8px", marginBottom: "24px" } });
  supplements.forEach((s) => {
    suppWrap.appendChild(el("div", {
      style: { background: "#1F2937", borderRadius: "12px", padding: "12px 16px", border: "1px solid #374151", display: "flex", justifyContent: "space-between", alignItems: "center" }
    }, [
      el("div", { style: { fontSize: "14px", fontWeight: "600", color: "#F9FAFB" }, text: `✅ ${s.name}` }),
      el("div", { style: { fontSize: "13px", color: "#6B7280" }, text: s.dose }),
    ]));
  });
  wrap.appendChild(suppWrap);

  wrap.appendChild(el("div", { style: { background: "#1F2937", borderRadius: "14px", padding: "16px", border: "1px solid #374151" } }, [
    el("div", { style: { fontSize: "13px", fontWeight: "700", color: "#F59E0B", marginBottom: "8px" }, text: "🔄 Deload Weeks" }),
    el("div", { style: { fontSize: "13px", color: "#9CA3AF", lineHeight: "1.6" }, text: "Every 8–10 weeks, reduce weight and volume by 40–50%. Gives joints and your nervous system time to recover — you often come back stronger." }),
  ]));

  root.appendChild(wrap);
}

function renderGoals(root) {
  const wrap = el("div", { style: { padding: "20px" } });
  wrap.appendChild(el("div", { style: { fontSize: "16px", fontWeight: "700", marginBottom: "16px", color: "#F9FAFB" }, text: "12-Month Target" }));

  wrap.appendChild(el("div", {
    style: { background: "linear-gradient(135deg, #1D4ED822, #7C3AED22)", border: "1px solid #3B82F644", borderRadius: "16px", padding: "20px", marginBottom: "16px" }
  }, [
    el("div", { style: { fontSize: "13px", color: "#9CA3AF", marginBottom: "4px" }, text: "Current → Goal" }),
    el("div", { style: { fontSize: "28px", fontWeight: "800", letterSpacing: "-0.04em", color: "#F9FAFB" }, text: "71–72 kg → 78–80 kg" }),
    el("div", { style: { fontSize: "13px", color: "#6B7280", marginTop: "4px" }, text: "~3,000 kcal/day with adequate protein" }),
  ]));

  wrap.appendChild(el("div", { style: { fontSize: "14px", fontWeight: "700", color: "#9CA3AF", marginBottom: "12px", textTransform: "uppercase", letterSpacing: "0.08em" }, text: "What you'll notice" }));

  goalItems.forEach((g) => {
    wrap.appendChild(el("div", { style: { display: "flex", alignItems: "center", gap: "12px", padding: "12px 0", borderBottom: "1px solid #1F2937" } }, [
      el("span", { style: { fontSize: "20px" }, text: g.icon }),
      el("span", { style: { fontSize: "14px", color: "#D1D5DB" }, text: g.label }),
    ]));
  });

  wrap.appendChild(el("div", { style: { marginTop: "20px", background: "#1F2937", borderRadius: "14px", padding: "16px", border: "1px solid #374151" } }, [
    el("div", { style: { fontSize: "13px", fontWeight: "700", color: "#10B981", marginBottom: "8px" }, text: "🏀 Sunday Basketball" }),
    el("div", { style: { fontSize: "13px", color: "#9CA3AF", lineHeight: "1.6" }, text: "Counts as your conditioning day. No extra cardio needed. Optional: 20–30 min walk on rest days." }),
  ]));

  root.appendChild(wrap);
}

render();
</script>
</body>
</html>
